<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Garden of Silence</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div id="app">

        <header id="topBar">

            <div class="logo">

                🍃 Garden of Silence

            </div>

            <div class="menu">

                <button id="btnNew">Nuevo</button>
                <button id="btnOpen">Abrir</button>
                <button id="btnSave">Guardar</button>
                <button id="btnExport">Exportar</button>
                <button id="btnSound" title="Sonido ambiental">🔇</button>

            </div>

        </header>

        <aside id="leftPanel">

            <button title="Mover" data-tool="select" class="active">🖐</button>

            <button title="Árbol" data-tool="tree">🌳</button>

            <button title="Flor" data-tool="flower">🌸</button>

            <button title="Roca" data-tool="rock">🪨</button>

            <button title="Arena" data-tool="sand">🌾</button>

            <button title="Rastrillar (arrastra sobre la arena, doble clic para alisar)" data-tool="rake">🪮</button>

            <button title="Borrar" data-tool="eraser">🗑</button>

        </aside>

        <main>

            <canvas id="gameCanvas"></canvas>

            <aside id="inspector" class="hidden">

                <h3 id="inspectorTitle">Objeto</h3>

                <label>
                    Rotación
                    <input type="range" id="inspRotation" min="0" max="360" step="1">
                </label>

                <label>
                    Escala
                    <input type="range" id="inspScale" min="0.3" max="2.5" step="0.05">
                </label>

                <label>
                    Opacidad
                    <input type="range" id="inspOpacity" min="0.2" max="1" step="0.05">
                </label>

                <label id="inspColorRow">
                    Color
                    <input type="color" id="inspColor">
                </label>

                <div class="inspectorActions">

                    <button id="inspDuplicate" title="Duplicar (Ctrl+D)">⧉ Duplicar</button>

                    <button id="inspDelete" title="Eliminar (Supr)">🗑 Eliminar</button>

                </div>

            </aside>

        </main>

        <footer id="statusBar">

            <span>X:0</span>

            <span>Y:0</span>

            <span>Zoom:100%</span>

            <span>FPS:60</span>

        </footer>

    </div>

    <script type="module" src="js/main.js"></script>

</body>

</html>
