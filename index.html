<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Garden of Silence</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div id="app">

        <header id="topBar">

            <div class="logo">

                🍃 Garden of Silence

            </div>

            <div class="menu">

                <button>Nuevo</button>
                <button>Abrir</button>
                <button>Guardar</button>
                <button>Exportar</button>

            </div>

        </header>

        <aside id="leftPanel">

            <button title="Mover" data-tool="select" class="active">🖐</button>

            <button title="Árbol" data-tool="tree">🌳</button>

            <button title="Flor" data-tool="flower">🌸</button>

            <button title="Roca" data-tool="rock">🪨</button>

            <button title="Arena" data-tool="sand">🌾</button>

            <button title="Borrar" data-tool="eraser">🗑</button>

        </aside>

        <main>

            <canvas id="gameCanvas"></canvas>

        </main>

        <footer id="statusBar">

            <span>X:0</span>

            <span>Y:0</span>

            <span>Zoom:100%</span>

            <span>FPS:60</span>

        </footer>

    </div>

    <script type="module" src="js/main.js"></script>

</body>

</html>
